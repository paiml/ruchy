# Clippy configuration for Ruchy

# Allow some reasonable limits
too-many-lines-threshold = 150
cognitive-complexity-threshold = 30

# We use wildcard imports in module definitions
warn-on-all-wildcard-imports = false

# Note: unwrap was previously in disallowed-methods but removed because
# serde_json::json! macro expansion internally calls unwrap(), causing
# false positives across 34+ call sites. The workspace lint
# `unwrap_used = "allow"` controls this lint category instead.
disallowed-methods = []