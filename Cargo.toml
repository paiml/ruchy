name = "parser"
harness = false

[[bench]]
name = "transpiler"
harness = false

[[bench]]
name = "parser_benchmarks"
harness = false

[[bench]]
name = "interpreter_benchmarks"
harness = false

[[bench]]
name = "transpiler_benchmarks"
harness = false

[[bench]]
name = "performance_v3_13"
harness = false

[[bench]]
name = "wasm_performance"
harness = false

[[bench]]
name = "bytecode_vm_performance"
harness = false

[[bench]]
name = "matrix_data_science_benchmarks"
harness = false

